<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - Essen</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="/" class="logo">
                <img src="https://i.imgur.com/7V2bzw3.png" alt="Essen Argentina" class="logo-img">
                <h1>ESSEN ARGENTINA</h1>
            </a>
            <nav>
                <ul>
                    <li><a href="/">Inicio</a></li>
                    <li><a href="#productos">Productos</a></li>
                    <li><a href="/admin">Admin</a></li>
                    <li><a href="/cart" class="cart-link">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count">0</span>
                    </a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="section-title">
            <h2>Tu Carrito de Compras</h2>
            <p>Revisa y modifica tus productos antes de comprar</p>
        </div>

        <div class="cart-container">
            <div class="cart-items" id="cartItems">
                <!-- Los items del carrito se cargarán aquí -->
                <div class="empty-cart">
                    <i class="fas fa-shopping-cart"></i>
                    <h3>Tu carrito está vacío</h3>
                    <p>Agrega algunos productos para comenzar</p>
                    <a href="/" class="btn">Ver Productos</a>
                </div>
            </div>

            <div class="cart-summary">
                <div class="summary-card">
                    <h3>Resumen de Compra</h3>
                    <div class="summary-line">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0</span>
                    </div>
                    <div class="summary-line">
                        <span>Envío:</span>
                        <span id="shipping">$0</span>
                    </div>
                    <div class="summary-line total">
                        <span>Total:</span>
                        <span id="total">$0</span>
                    </div>
                    <button class="btn btn-checkout" id="checkoutBtn" disabled>
                        <i class="fas fa-lock"></i> Proceder al Pago
                    </button>
                    <a href="/" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Seguir Comprando
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/cart.js"></script>
    <script src="js/cart-page.js"></script>
</body>
</html>
